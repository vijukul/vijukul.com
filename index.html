<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vijay Kulkarni</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />                                                                                                                                                 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      /* ── CSS Variables (your design system) ───────────────────── */
      :root {
        --primary:      #1B4F72;   /* deep navy — header, accents */
        --accent:       #2E86C1;   /* medium blue — links, highlights */
        --accent-light: #D6EAF8;   /* pale blue — tag backgrounds */
        --bg:           #F4F7F9;   /* page background */
        --surface:      #FFFFFF;   /* card background */
        --text:         #2C3E50;   /* main body text */
        --text-muted:   #6C7A89;   /* secondary text */
        --border:       #DCE3EA;   /* subtle dividers */
  
        --font-heading: 'Poppins', sans-serif;
        --font-body:    'Inter', sans-serif;
  
        --radius:  8px;
        --shadow:  0 2px 12px rgba(0,0,0,0.07);
        --max-width: 800px;
      }
  
      /* ── Reset ─────────────────────────────────────────────────── */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
  
      /* ── Base ──────────────────────────────────────────────────── */
      body {
        font-family: var(--font-body);
        font-size: 16px;
        line-height: 1.7;
        color: var(--text);
        background: var(--bg);
      }
    
      h1, h2, h3 {
        font-family: var(--font-heading);
        line-height: 1.3;
      }
  
      a {
        color: var(--accent);
        text-decoration: none;
      }
  
      a:hover {
        text-decoration: underline;
      }
    
      /* ── Layout ────────────────────────────────────────────────── */
      main {
        max-width: var(--max-width);
        margin: 40px auto;
        padding: 0 20px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
  
      footer {
        text-align: center;
        padding: 32px 20px;
        color: var(--text-muted);
        font-size: 14px;
      }
  
      /* ── Section cards ─────────────────────────────────────────── */
      section {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
  
      section h2 {
        font-size: 18px;
        padding: 18px 24px;
        background: var(--primary);
        color: white;
        letter-spacing: 0.5px;
      }
  
      .section-body {
        padding: 24px;
      }

      /* ── Header / Hero ─────────────────────────────────────────── */
      #hero {
        background: linear-gradient(135deg, #1B4F72 0%, #154360 100%);
        color: white;
        padding: 56px 20px;
      }
    
      .hero-inner {
        max-width: var(--max-width);
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
        flex-wrap: wrap;
      }
    
      .hero-text h1 {
        font-size: 42px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: white;
      }
    
      .tagline {
        font-size: 20px;
        font-weight: 500;
        color: #AED6F1;
        margin-top: 6px;
      }
    
      .location {
        font-size: 15px;
        color: #85C1E9;
        margin-top: 8px;
      }
    
      .dot {
        font-size: 10px;
        margin-right: 4px;
      }
    
      .btn-linkedin {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: white;
        color: var(--primary);
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 600;
        padding: 10px 18px;
        border-radius: 24px;
        text-decoration: none;
        transition: background 0.2s, transform 0.1s;
        white-space: nowrap;
      }
      
      .btn-linkedin:hover {
        background: var(--accent-light);
        transform: translateY(-1px);
        text-decoration: none;
      }      
    </style>
  </head>
  <body>

  <!-- HEADER -->
  <header id="hero">
    <div class="hero-inner">
      <div class="hero-text">
        <h1>Vijay Kulkarni</h1>
        <p class="tagline">Engineering Manager</p>
        <p class="location">
          <span class="dot">●</span> Bay Area, CA
        </p>
      </div>
      <div class="hero-links">
        <a href="https://linkedin.com/in/vijukul" target="_blank" class="btn-linkedin">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 
  1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
          linkedin.com/in/vijukul
        </a>
      </div>
    </div>
  </header>

    <!-- MAIN CONTENT -->
    <main>

      <section id="about">
        <h2>About</h2>
        <div class="section-body">
          <p>About me goes here.</p>
        </div>
      </section>
  
      <section id="experience">
        <h2>Experience</h2>
        <div class="section-body">
          <p>Experience goes here.</p>
        </div>
      </section>

      <section id="skills">
        <h2>Skills</h2>
        <div class="section-body">
          <p>Skills go here.</p>
        </div>
      </section>

      <section id="education">
        <h2>Education</h2>
        <div class="section-body">
          <p>Education goes here.</p>
        </div>
      </section>

    </main>

    <footer>
      <p>© 2026 Vijay Kulkarni</p>
    </footer>

  </body>
  </html>
