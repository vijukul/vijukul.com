<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vijay Kulkarni</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />                                                                                                                                                 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      /* ── CSS Variables (your design system) ───────────────────── */
      :root {
        --primary:      #1B4F72;   /* deep navy — header, accents */
        --accent:       #2E86C1;   /* medium blue — links, highlights */
        --accent-light: #D6EAF8;   /* pale blue — tag backgrounds */
        --bg:           #F4F7F9;   /* page background */
        --surface:      #FFFFFF;   /* card background */
        --text:         #2C3E50;   /* main body text */
        --text-muted:   #6C7A89;   /* secondary text */
        --border:       #DCE3EA;   /* subtle dividers */
  
        --font-heading: 'Poppins', sans-serif;
        --font-body:    'Inter', sans-serif;
  
        --radius:  8px;
        --shadow:  0 2px 12px rgba(0,0,0,0.07);
        --max-width: 800px;
      }
  
      /* ── Reset ─────────────────────────────────────────────────── */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
  
      /* ── Base ──────────────────────────────────────────────────── */
      body {
        font-family: var(--font-body);
        font-size: 16px;
        line-height: 1.7;
        color: var(--text);
        background: var(--bg);
      }
    
      h1, h2, h3 {
        font-family: var(--font-heading);
        line-height: 1.3;
      }
  
      a {
        color: var(--accent);
        text-decoration: none;
      }
  
      a:hover {
        text-decoration: underline;
      }
    
      /* ── Layout ────────────────────────────────────────────────── */
      main {
        max-width: var(--max-width);
        margin: 40px auto;
        padding: 0 20px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
  
      footer {
        text-align: center;
        padding: 32px 20px;
        color: var(--text-muted);
        font-size: 14px;
      }
  
      /* ── Section cards ─────────────────────────────────────────── */
      section {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
  
      section h2 {
        font-size: 18px;
        padding: 18px 24px;
        background: var(--primary);
        color: white;
        letter-spacing: 0.5px;
      }
  
      .section-body {
        padding: 24px;
      }
    </style>
  </head>
  <body>

    <!-- HEADER -->
    <header id="hero">
      <h1>Vijay Kulkarni</h1>
      <p class="tagline">Engineering Manager</p>
      <p class="location">Bay Area, CA</p>
      <a href="https://linkedin.com/in/vijukul" target="_blank">LinkedIn</a>
    </header>

    <!-- MAIN CONTENT -->
    <main>

      <section id="about">
        <h2>About</h2>
        <div class="section-body">
          <p>About me goes here.</p>
        </div>
      </section>
  
      <section id="experience">
        <h2>Experience</h2>
        <div class="section-body">
          <p>Experience goes here.</p>
        </div>
      </section>

      <section id="skills">
        <h2>Skills</h2>
        <div class="section-body">
          <p>Skills go here.</p>
        </div>
      </section>

      <section id="education">
        <h2>Education</h2>
        <div class="section-body">
          <p>Education goes here.</p>
        </div>
      </section>

    </main>

    <footer>
      <p>© 2026 Vijay Kulkarni</p>
    </footer>

  </body>
  </html>
